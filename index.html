<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <meta name="apple-mobile-web-app-title" content="QRツイン">
    <meta name="application-name" content="QRツイン">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="./zxing.min.js"></script>
    <script src="./zxing_qrcrypt_patch.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        
        #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
        #resultScreen { display: none; }

        .camera-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none;
        }
        video { width: 100%; display: block; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status-panel {
            padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto; display: none;
        }
        
        .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        
        button {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; 
            background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        
        /* ▼▼▼ 変更点：更新が確実に分かるよう起動ボタンを赤色に指定 ▼▼▼ */
        #startBtn { background: #81C784; color: #121212; } 
        #startBtn:active { background: #66BB6A; }
        
        #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
        #backBtn:active { background: #018786; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div id="startScreen">
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
            2つのQRコードを同時に、または連続して読み取ります。
        </p>
        <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    </div>

    <div class="camera-container" id="cameraContainer">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
        <div class="qr-result qr-1">
            <strong>1個目:</strong> <span id="text1">未検出</span>
        </div>
        <div class="qr-result qr-2">
            <strong>2個目:</strong> <span id="text2">未検出</span>
        </div>
    </div>

    <div id="resultScreen">
        <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
        <div class="qr-result qr-1" style="text-align: left;">
            <strong>1個目:</strong><br> <span id="finalText1"></span>
        </div>
        <div class="qr-result qr-2" style="text-align: left;">
            <strong>2個目:</strong><br> <span id="finalText2"></span>
        </div>
        <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
    </div>

    <div id="decryptPanel" style="display:none; margin-top:14px;">
        <input id="appPw" type="password" placeholder="アプリ暗号化パスワード" style="width:90%; padding:10px;">
        <button id="decryptBtn" style="margin-top:10px;">🔓 第2QRを復号して表示</button>
    </div>

<script>
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');
    
    const zxingCanvas = document.createElement('canvas');
    const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

    let isProcessing = false;
    let isScanning = false;
    let lastDetectTime = 0;
    const SCAN_INTERVAL_MS = 200; 
    
    let barcodeDetector = null;
    let zxingReader = null;

    let firstQR = null;
    let secondQR = null;

    async function startApp() {
        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        startBtn.innerText = "準備中...";

        try {
            await initEngines();
        } catch (e) {
            alert("エンジン初期化エラー: " + e.message);
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
            return;
        }

        try {
            const success = await startCamera();
            if (success) {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('cameraContainer').style.display = 'block';
                document.getElementById('statusPanel').style.display = 'block';
            } else {
                startBtn.disabled = false;
                startBtn.innerText = "📷 カメラを起動する";
            }
        } catch (e) {
            alert("カメラ起動エラー: " + e.message);
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
        }
    }

    async function initEngines() {
        // 1. 高速な位置検出用エンジン（OS標準）の初期化
        if ('BarcodeDetector' in window) {
            try {
                const formats = await BarcodeDetector.getSupportedFormats();
                if (formats.includes('qr_code')) {
                    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                }
            } catch (e) {}
        }
        
        // 2. 生データ抽出用エンジン（ZXing）の初期化
        if (typeof ZXing !== 'undefined') {
            if (ZXing.QRCodeReader) {
                zxingReader = new ZXing.QRCodeReader();
            } else {
                zxingReader = new ZXing.MultiFormatReader();
            }
        } else {
            throw new Error("ZXingライブラリが読み込まれていません。");
        }

        if (barcodeDetector && zxingReader) {
            document.getElementById('detectorInfo').innerText = "⚡ エンジン: ハイブリッド (BarcodeDetector + ZXing)";
        } else {
            document.getElementById('detectorInfo').innerText = "🐢 エンジン: ZXing 単独フォールバック";
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = stream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = resolve;
                setTimeout(resolve, 1000); 
            });
            
            await video.play().catch(e => console.warn("自動再生ブロック:", e));
            
            isScanning = true;
            requestAnimationFrame(scanLoop);
            return true;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    function getCenter(points) {
        if (!points || points.length === 0) return { x: 0, y: 0 };
        let sumX = 0, sumY = 0;
        points.forEach(p => { sumX += p.x; sumY += p.y; });
        return { x: sumX / points.length, y: sumY / points.length };
    }

    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    function getCleanText(text) {
        if (!text) return text;
        if (/^[01]{16}/.test(text)) return text.substring(16);
        if (text.length > 2) {
            const c0 = text.charCodeAt(0);
            if (c0 < 0x20 || (c0 >= 0x80 && c0 <= 0xFF)) {
                return text.substring(2);
            }
        }
        return text;
    }

    async function scanLoop() {
        if (!isScanning) return;

        if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
            overlayCanvas.width = video.videoWidth;
            overlayCanvas.height = video.videoHeight;
        }

        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

        if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
        if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

        const now = Date.now();
        if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
            isProcessing = true;
            lastDetectTime = now;
            let detectedItems = [];

            try {
                if (barcodeDetector) {
                    // 1. 高速な位置検出
                    const barcodes = await barcodeDetector.detect(video);
                    
                    for (const b of barcodes) {
                        const pts = b.cornerPoints;
                        
                        // 2. 座標からバウンディングボックスを計算し、少し広めに余白をとる
                        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                        pts.forEach(p => {
                            if (p.x < minX) minX = p.x;
                            if (p.y < minY) minY = p.y;
                            if (p.x > maxX) maxX = p.x;
                            if (p.y > maxY) maxY = p.y;
                        });
                        
                        const padding = 20; // 切り抜きの余白
                        minX = Math.max(0, minX - padding);
                        minY = Math.max(0, minY - padding);
                        maxX = Math.min(video.videoWidth, maxX + padding);
                        maxY = Math.min(video.videoHeight, maxY + padding);
                        
                        const width = maxX - minX;
                        const height = maxY - minY;
                        
                        let rawBytes = null;
                        
                        // 3. 検出されたQRの領域だけを切り抜き、ZXingで生データ（制御文字）を抽出
                        if (zxingReader && width > 0 && height > 0) {
                            try {
                                zxingCanvas.width = width;
                                zxingCanvas.height = height;
                                zxingCtx.drawImage(video, minX, minY, width, height, 0, 0, width, height);
                                
                                const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(zxingCanvas);
                                const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                                const result = zxingReader.decode(binaryBitmap);
                                
                                if (result && typeof result.getRawBytes === 'function') {
                                    rawBytes = result.getRawBytes();
                                }
                            } catch (e) {
                                // 切り出しデコード失敗時は無視してテキストのみ使う
                            }
                        }
                        
                        detectedItems.push({
                            text: b.rawValue,
                            rawBytes: rawBytes,
                            points: pts,
                            center: getCenter(pts)
                        });
                    }
                } else if (zxingReader) {
                    // BarcodeDetector非対応端末用のフォールバック
                    zxingCanvas.width = overlayCanvas.width;
                    zxingCanvas.height = overlayCanvas.height;
                    zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);
                    
                    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(zxingCanvas);
                    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                    const result = zxingReader.decode(binaryBitmap);
                    
                    if (result) {
                        const pts = result.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
                        let rawBytes = null;
                        if (typeof result.getRawBytes === 'function') {
                            rawBytes = result.getRawBytes();
                        }
                        detectedItems.push({
                            text: result.getText(),
                            rawBytes: rawBytes,
                            points: pts,
                            center: getCenter(pts)
                        });
                    }
                }
            } catch (err) {
                // エラーは無視して次のフレームへ
            }

            processDetections(detectedItems);
            isProcessing = false;
        }

// ▼▼▼ 第1QRの生データ（末尾）からアプリ暗号化フラグを検知する ▼▼▼
        let appEncOn = false;
        if (firstQR && QRCRYPT && typeof QRCRYPT.isAppEncryptionOnFromFirstQR === 'function') {
            // パッチ側の関数に firstQR オブジェクト全体（rawBytes含む）を渡して判定させる
            appEncOn = QRCRYPT.isAppEncryptionOnFromFirstQR(firstQR);
        }

        // 暗号化がONであれば、第2QRが読めなくても強制的にパスワード画面へ進む
        if (firstQR && (secondQR || appEncOn)) {
            showResultScreen(appEncOn);
            isScanning = false;
            return;
        }

        requestAnimationFrame(scanLoop);
    }

    function processDetections(items) {
        if (items.length === 0) return;

        if (items.length >= 2) {
            if (!firstQR) {
                firstQR = items[0];
                secondQR = items[1];
                updateUI();
                return;
            }
            if (firstQR && !secondQR) {
                const dist0 = getDistance(firstQR.center, items[0].center);
                const dist1 = getDistance(firstQR.center, items[1].center);
                if (dist0 > dist1) {
                    secondQR = items[0];
                    firstQR = items[1]; 
                } else {
                    secondQR = items[1];
                    firstQR = items[0]; 
                }
                updateUI();
                return;
            }
        }

        if (items.length === 1) {
            const item = items[0];
            
            if (!firstQR) {
                firstQR = item;
                updateUI();
            } else if (!secondQR) {
                if (item.text !== firstQR.text) {
                    secondQR = item;
                    updateUI();
                } else {
                    const dist = getDistance(firstQR.center, item.center);
                    const qrSize = getDistance(item.points[0], item.points[1]);
                    const distanceThreshold = Math.min(overlayCanvas.width * 0.1, qrSize * 0.45);

                    if (dist > distanceThreshold) {
                        secondQR = item;
                        updateUI();
                    } else {
                        firstQR.points = item.points;
                        firstQR.center = item.center;
                    }
                }
            }
        }
    }

    function updateUI() {
        if (firstQR) document.getElementById('text1').innerText = getCleanText(firstQR.text);
        if (secondQR) document.getElementById('text2').innerText = getCleanText(secondQR.text);
    }

    function formatResultText(text) {
        if (/^https?:\/\//i.test(text)) {
            return `<a href="${text}" target="_blank" rel="noopener noreferrer" style="color: #03DAC6; text-decoration: underline; font-weight: bold;">${text}</a>`;
        }
        const div = document.createElement('div');
        div.innerText = text;
        return div.innerHTML;
    }

    function showResultScreen(appEncOn) {
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]); 

        document.getElementById('cameraContainer').style.display = 'none';
        document.getElementById('statusPanel').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        
        document.getElementById('finalText1').innerHTML = formatResultText(getCleanText(firstQR.text));
        document.getElementById('finalText2').innerHTML = secondQR ? formatResultText(getCleanText(secondQR.text)) : "第2QRは未解読（暗号化の可能性）";

        // 検知した暗号化フラグに応じてパスワード入力を表示
        document.getElementById('decryptPanel').style.display = appEncOn ? 'block' : 'none';
    }

    function goBack() {
        firstQR = null;
        secondQR = null;
        
        document.getElementById('text1').innerText = "未検出";
        document.getElementById('text2').innerText = "未検出";
        
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('statusPanel').style.display = 'block';
        document.getElementById('decryptPanel').style.display = 'none';
        document.getElementById('appPw').value = ''; 
        
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        isScanning = true;
        requestAnimationFrame(scanLoop);
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.lineWidth = 6;
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.fillStyle = color + '44'; 
        ctx.fill();
    }

    document.getElementById('decryptBtn').addEventListener('click', async () => {
      try {
        const pw = document.getElementById('appPw').value || "";
        const dec = await QRCRYPT.decryptSecondFromFrame(video, pw);
        document.getElementById('finalText2').innerHTML = formatResultText(getCleanText(dec));
      } catch (e) {
        alert("復号に失敗: " + (e.message || e));
      }
    });

</script>
</body>
</html>
